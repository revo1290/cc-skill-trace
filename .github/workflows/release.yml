name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Publish to npm & create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Requires repo secret: SSH_SIGNING_KEY (private key of id_ed25519_signing).
      # The corresponding public key must be registered under
      # GitHub Settings → SSH and GPG keys → Signing keys.
      - name: Set up SSH signing key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_SIGNING_KEY }}" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          git config gpg.format ssh
          git config user.signingkey ~/.ssh/signing_key
          git config tag.gpgsign true

      - name: Bump version in package.json
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - name: Push version bump as release branch, open PR, and enable auto-merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v${{ inputs.version }}"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ inputs.version }}"
          git push origin "release/v${{ inputs.version }}"
          gh pr create \
            --title "chore: release v${{ inputs.version }}" \
            --body "Automated version bump. Auto-merges after CI passes." \
            --base main \
            --head "release/v${{ inputs.version }}"
          gh pr merge --auto --merge "release/v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create SSH-signed release tag
        run: |
          git tag -s -a "v${{ inputs.version }}" \
            -m "Release v${{ inputs.version }}" \
            "$(git rev-parse HEAD)"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
          make_latest: true

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
