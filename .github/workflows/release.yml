name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Publish to npm & create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Bump version in package.json
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - name: Push version bump as release branch and open PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v${{ inputs.version }}"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ inputs.version }}"
          git push origin "release/v${{ inputs.version }}"
          gh pr create \
            --title "chore: release v${{ inputs.version }}" \
            --body "Automated version bump. Merge after confirming the npm publish succeeded." \
            --base main \
            --head "release/v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create signed release tag via GitHub API
        run: |
          # Resolve the commit SHA the tag should point to (tip of release branch)
          COMMIT_SHA=$(git rev-parse HEAD)
          # Create an annotated tag object via the API.
          # Tags created through the REST API with GITHUB_TOKEN are signed by GitHub
          # and displayed as "Verified" on the repository.
          TAG_SHA=$(gh api repos/${{ github.repository }}/git/tags \
            --method POST \
            --field tag="v${{ inputs.version }}" \
            --field message="Release v${{ inputs.version }}" \
            --field object="$COMMIT_SHA" \
            --field type="commit" \
            --jq '.sha')
          # Create the lightweight ref pointing to the annotated tag object
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            --field ref="refs/tags/v${{ inputs.version }}" \
            --field sha="$TAG_SHA"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
          make_latest: true

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
